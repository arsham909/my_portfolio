name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys per-branch so two pushes don't race for the rootless app
# user's systemd queue on the box.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/my_portfolio
  DEPLOY_HOST: 134.209.208.211
  DEPLOY_USER: deploy
  DEPLOY_PORT: '22'

jobs:
  build:
    name: build + push image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - id: push
        uses: docker/build-push-action@v5
        with:
          context: ./portfolio
          file: ./portfolio/Dockerfile.prod
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: pull + restart on main
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: install ssh key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: pull image + restart portfolio
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          ssh -i ~/.ssh/id_deploy -p ${{ env.DEPLOY_PORT }} \
              ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
              "sudo -iu app bash -lc '
                set -euo pipefail
                podman pull ${{ env.IMAGE }}:${TAG}
                # Re-tag to :latest so the Quadlet (Image=…:latest) picks it up
                podman tag ${{ env.IMAGE }}:${TAG} ${{ env.IMAGE }}:latest
                systemctl --user restart portfolio
              '"

      - name: smoke test /healthz/
        run: |
          for i in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 https://arsham.codes/healthz/ || echo "000")
            if [ "$code" = "200" ]; then
              echo "healthz returned 200 after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "healthz never reached 200 — failing deploy"
          exit 1
