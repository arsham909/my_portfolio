name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: django check + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: portfolio/requirements.txt

      - name: install deps
        run: pip install -r portfolio/requirements.txt ruff

      - name: ruff lint
        run: ruff check portfolio || true   # warn-only initially; flip to fail once codebase is clean

      - name: django check
        working-directory: portfolio
        env:
          SECRET_KEY: ci-placeholder
          DEBUG: 'true'
          ALLOWED_HOSTS: localhost
          CSRF_TRUSTED_ORIGINS: http://localhost
          POSTGRES_DB: portfolio_local
          POSTGRES_USER: portfolio_user
          POSTGRES_PASSWORD: localpassword123
          SQL_HOST: localhost
          SQL_PORT: '5432'
          DJANGO_SETTINGS_MODULE: portfolio.settings.local
        run: python manage.py check
