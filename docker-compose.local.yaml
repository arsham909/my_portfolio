# Local dev — hot-reload Django, exposes :8000 and :5432
services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data_local:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: portfolio_local
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: localpassword123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_local"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./portfolio
      dockerfile: Dockerfile.dev
    volumes:
      - ./portfolio:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: portfolio.settings.local
      SECRET_KEY: insecure-local-dev-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: portfolio_local
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: localpassword123
      SQL_HOST: db
      SQL_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data_local:
