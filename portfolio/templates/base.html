{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1419">
    <meta name="description" content="{% block meta_description %}Arsham — engineer, builder, writer.{% endblock %}">
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (!t) {
                    t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
                }
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="alternate" type="application/rss+xml" title="Latest blog posts" href="{% url 'blog:post_feed' %}">
    <title>{% block title %}Arsham{% endblock %}</title>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a class="nav-logo" href="{% url 'homepage:homepage' %}">#&nbsp;arsham</a>
            <ul class="nav-links">
                <li><a href="{% url 'homepage:homepage' %}"{% if request.resolver_match.url_name == 'homepage' %} class="active"{% endif %}>home</a></li>
                <li><a href="{% url 'homepage:project_list' %}"{% if request.resolver_match.url_name == 'project_list' or request.resolver_match.url_name == 'project_detail' %} class="active"{% endif %}>projects</a></li>
                <li><a href="{% url 'blog:post_list' %}"{% if request.resolver_match.namespace == 'blog' %} class="active"{% endif %}>blog</a></li>
                <li><a href="{% url 'homepage:aboutme' %}"{% if request.resolver_match.url_name == 'aboutme' %} class="active"{% endif %}>about</a></li>
                <li><a href="{% url 'homepage:contactme' %}"{% if request.resolver_match.url_name == 'contactme' %} class="active"{% endif %}>contact</a></li>
                <li>
                    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
                        <span class="theme-icon-dark">☾</span>
                        <span class="theme-icon-light">☀</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>
    {% block content %}{% endblock %}
    {% include 'footer.html' %}
    <script>
        (function () {
            var btn = document.getElementById('theme-toggle');
            if (!btn) return;
            btn.addEventListener('click', function () {
                var cur = document.documentElement.getAttribute('data-theme') || 'dark';
                var next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                try { localStorage.setItem('theme', next); } catch (e) {}
            });
        })();
    </script>
</body>
</html>
