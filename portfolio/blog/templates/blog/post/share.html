{% extends "base.html" %}

{% block title %}Share — {{ post.title }}{% endblock %}

{% block content %}
<main>
    {% if sent %}
        <div class="form-card">
            <div class="flash-success">"{{ post.title }}" sent to {{ form.cleaned_data.to }}.</div>
            <p><a href="{{ post.get_absolute_url }}">&larr; back to post</a></p>
        </div>
    {% else %}
        <section class="hero">
            <h1>share by email</h1>
            <p>"{{ post.title }}"</p>
        </section>
        <div class="form-card">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <input type="submit" value="send email">
            </form>
        </div>
    {% endif %}
</main>
{% endblock %}
